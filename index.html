<!-- index.html: 게임 진입점 (저장소 루트). 에셋·스크립트는 shooting-game/ 기준 -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>TACTICAL SHOOTER — UNIT COMMAND</title>
    <!-- 문서 기준 URL을 shooting-game/ 으로 두어, 스크립트·Phaser load 경로가 한 단계 안쪽과 동일하게 동작 -->
    <base href="./shooting-game/" />

    <!-- 사이버펑크 HUD 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

    <style>
      /* 전체 페이지 리셋 */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #000005;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        /* 배경 그리드 패턴 */
        background-image:
          linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Phaser 캔버스 스타일 */
      canvas {
        display: block;
        /* 미묘한 외곽 글로우 */
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.2),
          0 0 30px rgba(0, 212, 255, 0.08),
          0 0 80px rgba(0, 0, 30, 0.9);
        /* 스캔라인 오버레이 (CSS 레이어) */
        position: relative;
      }

      /* 로딩 화면 (Phaser 초기화 전) */
      #boot-screen {
        position: fixed;
        inset: 0;
        background: #000814;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #boot-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-title {
        font-family: 'Orbitron', 'Courier New', monospace;
        font-size: 22px;
        font-weight: 700;
        color: #00d4ff;
        letter-spacing: 8px;
        margin-bottom: 20px;
        text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
      }
      #boot-bar-wrap {
        width: 260px;
        height: 3px;
        background: #001a3a;
        border: 1px solid #003366;
        overflow: hidden;
      }
      #boot-bar {
        height: 100%;
        background: linear-gradient(90deg, #00d4ff, #00ffaa);
        width: 0%;
        animation: bootLoad 1.2s ease forwards;
        box-shadow: 0 0 8px #00d4ff;
      }
      #boot-sub {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px;
        color: #335566;
        letter-spacing: 4px;
        margin-top: 14px;
      }
      @keyframes bootLoad {
        0%   { width: 0%; }
        60%  { width: 85%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>

    <!-- 부팅 스플래시 (1.4초 후 자동 제거) -->
    <div id="boot-screen">
      <div id="boot-title">TACTICAL SHOOTER</div>
      <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
      <div id="boot-sub">INITIALIZING COMBAT SYSTEMS...</div>
    </div>

    <!-- 1. Phaser 라이브러리 -->
    <script src="./libs/phaser.min.js"></script>
    <!-- 2. 게임 오브젝트 -->
    <script src="./src/objects/Player.js"></script>
    <script src="./src/objects/Bullet.js"></script>
    <script src="./src/objects/Enemy.js"></script>
    <!-- 3. 씬 -->
    <script src="./src/scenes/TitleScene.js"></script>
    <script src="./src/scenes/CharacterSelectScene.js"></script>
    <script src="./src/scenes/GameScene.js"></script>
    <!-- 4. 게임 시작 -->
    <script src="./src/main.js"></script>

    <script>
      // 부팅 스플래시 자동 제거
      setTimeout(function() {
        var boot = document.getElementById('boot-screen');
        if (boot) { boot.classList.add('hidden'); }
      }, 1400);
    </script>
  </body>
</html>
